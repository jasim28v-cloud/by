<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WIZARD NEBULA AI</title>
    <style>
        :root { --neon: #00f3ff; --pink: #ff0055; --bg: #030307; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        .app-container { flex: 1; display: flex; flex-direction: column; max-width: 900px; margin: 0 auto; width: 100%; border: 1px solid rgba(0,243,255,0.2); background: rgba(0,0,0,0.9); }
        header { padding: 15px; text-align: center; border-bottom: 2px solid var(--neon); box-shadow: 0 0 15px var(--neon); }
        #chat-flow { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .bubble { max-width: 80%; padding: 12px; border-radius: 12px; font-size: 15px; line-height: 1.5; }
        .user-b { align-self: flex-start; background: rgba(0, 243, 255, 0.1); border-left: 4px solid var(--neon); }
        .ai-b { align-self: flex-end; background: rgba(255, 0, 85, 0.1); border-right: 4px solid var(--pink); }
        .control { padding: 15px; display: flex; gap: 10px; background: #000; }
        input { flex: 1; background: transparent; border: 1px solid var(--neon); padding: 12px; color: white; border-radius: 8px; outline: none; }
        button { background: var(--neon); border: none; padding: 0 25px; border-radius: 8px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div class="app-container">
    <header>
        <h2 style="margin:0">WIZARD <span style="color:var(--pink)">NEBULA</span></h2>
        <div style="font-size: 10px; color: var(--neon)">الحالة: النظام السحابي (7GB) متصل</div>
    </header>

    <div id="chat-flow">
        <div class="bubble ai-b">مرحباً يا جاسم. المفتاح نشط الآن. كيف يمكنني مساعدتك؟</div>
    </div>

    <div class="control">
        <input type="text" id="userInput" placeholder="اكتب رسالتك هنا...">
        <button onclick="processAI()">إرسال</button>
    </div>
</div>

<script>
    // مفتاحك الجديد الذي قمت بإنشائه في الصور
    const HF_TOKEN = "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"; 
    const API_URL = "https://api-inference.huggingface.co/models/TheBloke/WizardLM-7B-uncensored-GGML";

    async function processAI() {
        const input = document.getElementById('userInput');
        const chat = document.getElementById('chat-flow');
        const text = input.value;
        if (!text) return;

        chat.innerHTML += `<div class="bubble user-b">${text}</div>`;
        input.value = "";
        
        const loading = document.createElement('div');
        loading.className = "bubble ai-b";
        loading.innerText = "جاري الاتصال بالسحابة... (قد يستغرق دقيقة في المرة الأولى)";
        chat.appendChild(loading);
        chat.scrollTop = chat.scrollHeight;

        try {
            const response = await fetch(API_URL, {
                method: "POST",
                headers: { "Authorization": `Bearer ${HF_TOKEN}`, "Content-Type": "application/json" },
                body: JSON.stringify({ inputs: text })
            });
            const data = await response.json();
            
            if (data.error) {
                loading.innerText = "السحابة تقوم بتحميل ملف الـ 7GB حالياً. انتظر دقيقة ثم أرسل سؤالك مرة أخرى.";
            } else {
                loading.innerText = data[0]?.generated_text || "لا توجد استجابة.";
            }
        } catch (e) {
            loading.innerText = "حدث خطأ في الشبكة. تأكد من السماح بالسر في GitHub.";
        }
        chat.scrollTop = chat.scrollHeight;
    }
</script>
</body>
</html>
