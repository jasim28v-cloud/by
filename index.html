<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WIZARD NEBULA AI | جاسم</title>
    <style>
        :root { --neon: #00f3ff; --pink: #ff0055; --bg: #030307; }
        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; overflow: hidden; height: 100vh; }
        
        .app-container { display: flex; flex-direction: column; height: 100vh; max-width: 1000px; margin: 0 auto; background: rgba(0,0,0,0.8); backdrop-filter: blur(20px); border: 1px solid rgba(0,243,255,0.2); }
        header { padding: 20px; text-align: center; border-bottom: 2px solid var(--neon); box-shadow: 0 0 20px rgba(0, 243, 255, 0.3); }
        h1 { margin: 0; font-size: 1.5rem; letter-spacing: 5px; text-shadow: 0 0 10px var(--neon); }
        
        #chat-flow { flex: 1; overflow-y: auto; padding: 25px; display: flex; flex-direction: column; gap: 20px; }
        .bubble { max-width: 80%; padding: 15px; border-radius: 15px; line-height: 1.6; animation: slide 0.4s ease; font-size: 15px; }
        .user-b { align-self: flex-start; background: rgba(0, 243, 255, 0.1); border-left: 4px solid var(--neon); }
        .ai-b { align-self: flex-end; background: rgba(255, 0, 85, 0.05); border-right: 4px solid var(--pink); border-radius: 15px 15px 0 15px; }

        .control-panel { padding: 20px; display: flex; gap: 10px; background: rgba(255,255,255,0.03); }
        input { flex: 1; background: transparent; border: 1px solid var(--neon); padding: 15px; color: white; border-radius: 10px; outline: none; }
        button { background: var(--neon); color: #000; border: none; padding: 0 30px; border-radius: 10px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        button:hover { box-shadow: 0 0 20px var(--neon); transform: scale(1.05); }

        @keyframes slide { from { opacity: 0; transform: translateY(20px); } }
    </style>
</head>
<body>

<div class="app-container">
    <header>
        <h1>WIZARD <span style="color:var(--pink)">NEBULA</span></h1>
        <div style="font-size: 10px; color: var(--neon); margin-top: 5px;">الحالة: النظام السحابي (7GB) متصل ونشط</div>
    </header>

    <div id="chat-flow">
        <div class="bubble ai-b">مرحباً يا جاسم. تم تفعيل المفتاح بنجاح. أنا الآن متصل بملف الـ 7GB وجاهز لأوامرك.</div>
    </div>

    <div class="control-panel">
        <input type="text" id="userInput" placeholder="اكتب أمرك هنا...">
        <button onclick="processAI()">إرسال</button>
    </div>
</div>

<script>
    const HF_TOKEN = "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"; 
    const API_URL = "https://api-inference.huggingface.co/models/TheBloke/WizardLM-7B-uncensored-GGML";

    async function processAI() {
        const input = document.getElementById('userInput');
        const chat = document.getElementById('chat-flow');
        const text = input.value;
        if (!text) return;

        chat.innerHTML += `<div class="bubble user-b">${text}</div>`;
        input.value = "";
        
        const loading = document.createElement('div');
        loading.className = "bubble ai-b";
        loading.innerText = "جاري تحليل البيانات في السحابة...";
        chat.appendChild(loading);
        chat.scrollTop = chat.scrollHeight;

        try {
            const response = await fetch(API_URL, {
                method: "POST",
                headers: { "Authorization": `Bearer ${HF_TOKEN}`, "Content-Type": "application/json" },
                body: JSON.stringify({ inputs: text })
            });
            const data = await response.json();
            
            if (data.error) {
                loading.innerText = "السحابة تقوم بتحميل الموديل (7GB) الآن. انتظر 60 ثانية ثم أرسل سؤالك مرة أخرى.";
            } else {
                loading.innerText = data[0]?.generated_text || "لا يوجد استجابة.";
            }
        } catch (e) {
            loading.innerText = "فشل في الاتصال. تأكد من صحة الرمز الجديد.";
        }
        chat.scrollTop = chat.scrollHeight;
    }
</script>
</body>
</html>
