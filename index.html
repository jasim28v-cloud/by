<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WIZARD NEBULA AI | بوابة جاسم</title>
    <style>
        :root { --neon: #00f3ff; --pink: #ff0055; --bg: #030307; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        .app-container { flex: 1; display: flex; flex-direction: column; max-width: 900px; margin: 0 auto; width: 100%; border: 1px solid rgba(0,243,255,0.2); background: rgba(0,0,0,0.9); box-shadow: 0 0 50px rgba(0,0,0,1); }
        header { padding: 15px; text-align: center; border-bottom: 2px solid var(--neon); box-shadow: 0 0 15px var(--neon); }
        #chat-flow { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .bubble { max-width: 80%; padding: 12px; border-radius: 12px; font-size: 15px; line-height: 1.5; animation: slideIn 0.3s ease; }
        .user-b { align-self: flex-start; background: rgba(0, 243, 255, 0.1); border-left: 4px solid var(--neon); }
        .ai-b { align-self: flex-end; background: rgba(255, 0, 85, 0.1); border-right: 4px solid var(--pink); border-radius: 15px 15px 0 15px; }
        .control { padding: 15px; display: flex; gap: 10px; background: #000; }
        input { flex: 1; background: transparent; border: 1px solid var(--neon); padding: 12px; color: white; border-radius: 8px; outline: none; }
        button { background: var(--neon); border: none; padding: 0 25px; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        button:hover { box-shadow: 0 0 15px var(--neon); transform: scale(1.05); }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } }
    </style>
</head>
<body>

<div class="app-container">
    <header>
        <h1 style="margin:0; font-size: 1.4rem; letter-spacing: 3px;">WIZARD <span style="color:var(--pink)">NEBULA</span></h1>
        <div style="font-size: 10px; color: var(--neon); margin-top: 5px;">الحالة: الاتصال بالملف السحابي (7GB) نشط</div>
    </header>

    <div id="chat-flow">
        <div class="bubble ai-b">مرحباً يا جاسم. تم الربط بنجاح مع ملف الموديل الخارجي. أنا الآن جاهز لمعالجة أوامرك.</div>
    </div>

    <div class="control">
        <input type="text" id="userInput" placeholder="أدخل بياناتك هنا...">
        <button onclick="processAI()">إرسال</button>
    </div>
</div>

<script>
    // مفتاحك الخاص الذي قمت بإنشائه
    const HF_TOKEN = "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"; 
    
    // الرابط العالمي للموديل الذي اخترته
    const API_URL = "https://api-inference.huggingface.co/models/TheBloke/WizardLM-7B-uncensored-GGML";

    async function processAI() {
        const input = document.getElementById('userInput');
        const chat = document.getElementById('chat-flow');
        const text = input.value;
        if (!text) return;

        chat.innerHTML += `<div class="bubble user-b">${text}</div>`;
        input.value = "";
        
        const loading = document.createElement('div');
        loading.className = "bubble ai-b";
        loading.innerText = "جاري الاتصال بالسحابة... (قد يستغرق دقيقة في المرة الأولى حتى يفتح الملف الضخم)";
        chat.appendChild(loading);
        chat.scrollTop = chat.scrollHeight;

        try {
            const response = await fetch(API_URL, {
                method: "POST",
                headers: { 
                    "Authorization": `Bearer ${HF_TOKEN}`, 
                    "Content-Type": "application/json" 
                },
                body: JSON.stringify({ 
                    inputs: text,
                    parameters: { max_new_tokens: 250, temperature: 0.7 }
                })
            });

            const data = await response.json();
            
            if (data.error) {
                // هذا يعني أن الموديل قيد التحميل في خوادم Hugging Face
                loading.innerText = "الملف (7GB) قيد التحميل حالياً في الذاكرة السحابية. يرجى الانتظار 60 ثانية ثم المحاولة مجدداً.";
            } else {
                loading.innerText = data[0]?.generated_text || "انقطع الاتصال الرقمي.";
            }
        } catch (e) {
            loading.innerText = "حدث خطأ في الاتصال. تأكد من أن GitHub سمح باستخدام المفتاح.";
        }
        chat.scrollTop = chat.scrollHeight;
    }
</script>
</body>
</html>
